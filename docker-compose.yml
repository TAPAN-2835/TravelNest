
services:
  nginx:
    container_name: travelnest-nginx
    image: nginx:alpine
    profiles: ["apps"]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - ai-service
    restart: unless-stopped

  backend:
    container_name: travelnest-backend
    build: 
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["apps"]
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost
      - AI_SERVICE_URL=http://ai-service:8000
      - DATABASE_URL=postgresql://travelnest_user:travelnest_pass@postgres:5432/travelnest
      - MONGODB_URI=mongodb://mongodb:27017/travelnest
      - REDIS_URL=redis://redis:6379
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      ai-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    container_name: travelnest-frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    profiles: ["apps"]
    depends_on:
      - backend
    restart: unless-stopped

  ai-service:
    container_name: travelnest-ai
    build: 
      context: ./ai-service
      dockerfile: Dockerfile
    profiles: ["apps"]
    environment:
      - AI_SERVICE_URL=http://localhost:8000
      - AWS_S3_BUCKET=travelnest-documents
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports: ["27017:27017"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

  # Local Development Database (Replace with RDS for Production)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: travelnest
      POSTGRES_USER: travelnest_user
      POSTGRES_PASSWORD: travelnest_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelnest_user -d travelnest"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
